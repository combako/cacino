<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Clicker Game</title>
    <!-- Подключаем SDK Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #0f0c1b);
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .score-container { font-size: 28px; font-weight: bold; margin-bottom: 20px; color: #f39c12; }
        .coin {
            width: 150px; height: 150px;
            background: radial-gradient(circle, #f1c40f, #d35400);
            border-radius: 50%;
            box-shadow: 0 0 20px #f1c40f;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .coin:active { transform: scale(0.95); }
        .btn-donate {
            margin-top: 30px; padding: 12px 24px;
            font-size: 16px; background-color: #2ecc71;
            color: white; border: none; border-radius: 25px;
            cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
        }
    </style>
</head>
<body>

    <div class="score-container">Монеты: <span id="score">0</span></div>
    <div class="coin" id="clickBtn"></div>
    
    <button class="btn-donate" id="donateBtn">Купить Буст x5 (⭐️ 5 Stars)</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        let score = 0;
        let clickPower = 1;
        const scoreEl = document.getElementById('score');

        // Клик по монете
        document.getElementById('clickBtn').addEventListener('click', () => {
            score += clickPower;
            scoreEl.innerText = score;
            tg.HapticFeedback.impactOccurred('medium'); // Вибрация при клике
        });

        // Запрос на покупку буста за Звезды
        document.getElementById('donateBtn').addEventListener('click', async () => {
            const userId = tg.initDataUnsafe?.user?.id;
            if (!userId) return alert('Ошибка авторизации Telegram');

            // Отправляем запрос на наш сервер для генерации инвойса
            try {
                const response = await fetch('https://your-backend-domain.com', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: userId })
                });
                const data = await response.json();

                if (data.invoiceLink) {
                    // Открываем нативный платежный шлюз Telegram Stars
                    tg.openInvoice(data.invoiceLink, (status) => {
                        if (status === 'paid') {
                            clickPower = 5;
                            alert('Спасибо за донат! Теперь ваш клик равен 5 монетам!');
                        } else if (status === 'cancelled') {
                            alert('Платеж отменен');
                        } else {
                            alert('Ошибка оплаты');
                        }
                    });
                }
            } catch (err) {
                console.error(err);
                alert('Ошибка соединения с сервером');
            }
        });
    </script>
</body>
</html>
