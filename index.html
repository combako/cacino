<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Stars Casino</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #080710;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-blue: #00f0ff;
            --neon-green: #00ff66;
            --neon-pink: #ff007f;
            --text-main: #ffffff;
            --text-secondary: #8a8a9d;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 127, 0.06) 0%, transparent 40%);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            text-align: center;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* Эффект стекла для карточек */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s ease;
        }

        .glass-panel:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 240, 255, 0.05);
        }

        /* Верхняя панель баланса */
        .header-balance {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        .balance-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .balance-value {
            font-size: 34px;
            font-weight: 800;
            color: #ffca28;
            text-shadow: 0 0 20px rgba(255, 202, 40, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h3 {
            font-size: 18px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 18px;
            letter-spacing: 0.5px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* График Краша */
        #crash-area {
            height: 180px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 18px;
            position: relative;
            overflow: hidden;
            margin-bottom: 18px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #rocket {
            font-size: 50px;
            position: absolute;
            bottom: 15px;
            left: 15px;
            filter: drop-shadow(0 0 15px var(--neon-blue));
            transform-origin: center;
        }

        #multiplier {
            font-size: 42px;
            font-weight: 900;
            color: var(--neon-green);
            text-shadow: 0 0 25px rgba(0, 255, 102, 0.4);
            font-variant-numeric: tabular-nums;
            z-index: 2;
            transition: color 0.2s;
        }

        /* Рулетка */
        .wheel-container {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 18px auto;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255,255,255,0.02);
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px dashed rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: transform 1.5s cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        .wheel.spinning {
            border-color: var(--neon-blue);
            animation: pulse-border 1.5s infinite;
        }

        #roulette-status {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        /* Поля ввода */
        input {
            width: 100%;
            box-sizing: border-box;
            padding: 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 16px;
        }

        input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
        }

        /* Премиум Кнопки */
        .btn {
            position: relative;
            background: linear-gradient(135deg, #0072ff 0%, #00c6ff 100%);
            color: #fff;
            border: none;
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
            overflow: hidden;
        }

        .btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .btn-take {
            background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
            box-shadow: 0 6px 20px rgba(0, 176, 155, 0.3);
        }

        .btn-red {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            box-shadow: 0 6px 20px rgba(255, 65, 108, 0.25);
            margin-bottom: 12px;
        }

        .btn-black {
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-withdraw {
            background: linear-gradient(135deg, #8a2387 0%, #e94057 50%, #f27121 100%);
            box-shadow: 0 6px 20px rgba(233, 64, 87, 0.3);
        }

        .flex-buttons {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 240, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0); }
        }
    </style>
</head>
<body>

    <!-- БАЛАНС -->
    <div class="glass-panel header-balance">
        <span class="balance-title">Ваш игровой баланс</span>
        <span class="balance-value">💰 <span id="balance-val">0</span> ⭐</span>
    </div>

    <!-- ИГРА КРАШ -->
    <div class="glass-panel">
        <h3>🚀 КРАШ ИГРА <span style="font-size:12px; color:var(--text-secondary); font-weight:400; margin-left:auto;">Ставка: 10 ⭐</span></h3>
        <div id="crash-area">
            <div id="multiplier">1.00x</div>
            <div id="rocket">🚀</div>
        </div>
        <button class="btn" id="btn-crash-start" onclick="startCrash()">ВЗЛЕТ РАКЕТЫ</button>
        <button class="btn btn-take" id="btn-crash-take" onclick="takeCrash()" style="display:none;">ЗАБРАТЬ ВЫИГРЫШ</button>
    </div>

    <!-- РУЛЕТКА -->
    <div class="glass-panel">
        <h3>🎰 ЖИВАЯ РУЛЕТКА <span style="font-size:12px; color:var(--text-secondary); font-weight:400; margin-left:auto;">Ставка: 10 ⭐</span></h3>
        <div class="wheel-container">
            <div class="wheel" id="wheel-anim">❓</div>
        </div>
        <div id="roulette-status">Выберите цвет фишек для начала раунда</div>
        <div class="flex-buttons">
            <button class="btn btn-red" onclick="playRoulette('red')">🔴 НА Красное (x2)</button>
            <button class="btn btn-black" onclick="playRoulette('black')">⚫ НА Черное (x2)</button>
        </div>
    </div>

    <!-- СТИЛЬНЫЙ ВЫВОД -->
    <div class="glass-panel">
        <h3>💎 ВЫВОД СРЕДСТВ</h3>
        <div style="font-size:12px; color:var(--text-secondary); text-align:left; margin-bottom:14px; line-height:1.4;">
            Курс обмена: <b style="color:#ffca28;">100 ⭐ = 0.8 TON</b>.<br>Минимальный лимит на снятие: 100 ⭐
        </div>
        <input type="text" id="ton-wallet" placeholder="Адрес кошелька TON (UQ...)">
        <button class="btn btn-withdraw" onclick="requestWithdraw()">ВЫВЕСТИ В TON</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let balance = 0; 
        
        try {
            tg.expand();
            tg.ready();
        } catch(e) {}

        function updateUI() {
            document.getElementById('balance-val').innerText = balance;
        }

        if (balance === 0) {
            balance = 150; // Баланс для теста графики
            updateUI();
        }

        let crashInterval;
        let currentX = 1.0;
        let crashLimit = 1.0;

        function startCrash() {
            if (balance < 10) return alert("Недостаточно звезд!");
            balance -= 10;
            updateUI();

            document.getElementById('btn-crash-start').style.display = 'none';
            document.getElementById('btn-crash-take').style.display = 'block';
            
            currentX = 1.0;
            
            let rand = Math.random();
            if (rand < 0.08) crashLimit = 1.00; 
            else if (rand < 0.65) crashLimit = (Math.random() * 0.4 + 1.01).toFixed(2);
