<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Royal VIP</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            background: radial-gradient(circle, #1a0033 0%, #050014 100%);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        .header {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            margin-bottom: 30px;
        }
        .slot-machine {
            background: linear-gradient(145deg, #2a0845, #6441a5);
            border: 4px solid #ff007f;
            box-shadow: 0 0 25px #ff007f, inset 0 0 15px #000;
            border-radius: 20px;
            padding: 25px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .reels {
            display: flex;
            justify-content: center;
            gap: 15px;
            background: #000;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #00ffcc;
        }
        .reel {
            width: 75px;
            height: 75px;
            background: #111;
            border-radius: 8px;
            font-size: 45px;
            line-height: 75px;
        }
        .controls {
            margin-top: 30px;
        }
        .btn-spin {
            background: linear-gradient(to right, #ff007f, #ff00ab);
            border: none;
            color: white;
            padding: 15px 50px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px #ff007f;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-spin:active {
            transform: scale(0.95);
            box-shadow: 0 0 5px #ff007f;
        }
        .info-text {
            margin-top: 25px;
            font-size: 14px;
            color: #aaa;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="header">💎 VIP CASINO ROYAL 💎</div>
    
    <div class="slot-machine">
        <div class="reels">
            <div id="reel1" class="reel">🎰</div>
            <div id="reel2" class="reel">🎰</div>
            <div id="reel3" class="reel">🎰</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-spin" onclick="startLocalSpin()">Крутить</button>
    </div>

    <div class="info-text">
        Добро пожаловать в VIP-зал!<br>
        Нажмите кнопку выше, чтобы запустить симуляцию автомата.<br>
        Управление основным балансом и вывод средств доступны в меню чата.
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрываем на всю высоту экрана телефона

        const symbols = ["🍒", "🍋", "7️⃣", "💎", "🍇", "🔔"];
        let isSpinning = false;

        function startLocalSpin() {
            if (isSpinning) return;
            isSpinning = true;

            // Имитация кручения анимации
            const interval = setInterval(() => {
                document.getElementById('reel1').innerText = symbols[Math.floor(Math.random() * symbols.length)];
                document.getElementById('reel2').innerText = symbols[Math.floor(Math.random() * symbols.length)];
                document.getElementById('reel3').innerText = symbols[Math.floor(Math.random() * symbols.length)];
            }, 60);

            // Имитируем подкрутку 70/30 на самом клиенте для визуального эффекта
            setTimeout(() => {
                clearInterval(interval);
                
                const isWin = Math.random() > 0.70; // 30% шанса на красивую победную комбинацию на экране
                
                if (isWin) {
                    const winSymbol = symbols[Math.floor(Math.random() * 4)]; // Выбираем топовый символ
                    document.getElementById('reel1').innerText = winSymbol;
                    document.getElementById('reel2').innerText = winSymbol;
                    document.getElementById('reel3').innerText = winSymbol;
                    
                    tg.HapticFeedback.notificationOccurred("success"); // Телефон премиально вибрирует при победе
                } else {
                    // Генерируем разные символы для проигрыша
                    document.getElementById('reel1').innerText = symbols[0];
                    document.getElementById('reel2').innerText = symbols[1];
                    document.getElementById('reel3').innerText = symbols[2];
                    
                    tg.HapticFeedback.notificationOccurred("error"); // Легкая вибрация ошибки
                }
                
                isSpinning = false;
            }, 1200); // Барабаны крутятся 1.2 секунды
        }
    </script>
</body>
</html>
