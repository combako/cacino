<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Royal VIP</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            background: radial-gradient(circle, #1a0033 0%, #050014 100%);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        .header {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            margin-bottom: 20px;
        }
        .slot-machine {
            background: linear-gradient(145deg, #2a0845, #6441a5);
            border: 4px solid #ff007f;
            box-shadow: 0 0 25px #ff007f, inset 0 0 15px #000;
            border-radius: 20px;
            padding: 20px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .reels {
            display: flex;
            justify-content: center;
            gap: 15px;
            background: #000;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #00ffcc;
        }
        .reel {
            width: 70px;
            height: 70px;
            background: #111;
            border-radius: 8px;
            font-size: 45px;
            line-height: 70px;
            transition: transform 0.5s ease-in-out;
        }
        .controls {
            margin-top: 25px;
        }
        .btn-spin {
            background: linear-gradient(to right, #ff007f, #ff00ab);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px #ff007f;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-spin:active {
            transform: scale(0.95);
            box-shadow: 0 0 5px #ff007f;
        }
        .balance-box {
            font-size: 18px;
            margin-top: 10px;
            color: #ffcc00;
            text-shadow: 0 0 5px #ffcc00;
        }
    </style>
</head>
<body>

    <div class="header">💎 VIP CASINO ROYAL 💎</div>
    
    <div class="slot-machine">
        <div class="reels">
            <div id="reel1" class="reel">🍒</div>
            <div id="reel2" class="reel">🍒</div>
            <div id="reel3" class="reel">🍒</div>
        </div>
    </div>

    <div class="balance-box">Ставка: <span id="current-bet">100</span> | Монеты: <span id="user-balance">...</span></div>

    <div class="controls">
        <button class="btn-spin" onclick="spin()">Крутить</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрываем приложение на весь экран

        const symbols = ["🍒", "🍋", "7️⃣", "💎"];
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 12345; // Тестовый ID, если запуск не из ТГ
        
        let bet = 100;
        let isSpinning = false;

        async function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            // Запуск эффекта быстрого мигания (имитация кручения барабанов)
            const interval = setInterval(() => {
                document.getElementById('reel1').innerText = symbols[Math.floor(random() * symbols.length)];
                document.getElementById('reel2').innerText = symbols[Math.floor(random() * symbols.length)];
                document.getElementById('reel3').innerText = symbols[Math.floor(random() * symbols.length)];
            }, 70);

            try {
                // Отправляем запрос на наш Python бэкенд
                const response = await fetch('http://ВАШ_IP_СЕРВЕРА:8000/api/spin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, bet: bet })
                });
                
                const result = await response.json();
                
                setTimeout(() => {
                    clearInterval(interval);
                    // Устанавливаем итоговые символы, которые прислал бэкенд (с учетом подкрутки 70/30)
                    document.getElementById('reel1').innerText = symbols[result.symbols[0]];
                    document.getElementById('reel2').innerText = symbols[result.symbols[1]];
                    document.getElementById('reel3').innerText = symbols[result.symbols[2]];
                    
                    document.getElementById('user-balance').innerText = result.balance;
                    
                    if (result.status === "win") {
                        tg.HapticFeedback.notificationOccurred("success"); // Вибрация телефона при победе
                        alert(`🔥 ПОБЕДА! Вы выиграли ${result.win_amount} монет!`);
                    } else {
                        tg.HapticFeedback.notificationOccurred("error");
                    }
                    isSpinning = false;
                }, 1000); // Тормозим барабаны через 1 секунду

            } catch (error) {
                clearInterval(interval);
                alert("Ошибка соединения с сервером казино");
                isSpinning = false;
            }
        }
        
        function random() { return Math.random(); }
    </script>
</body>
</html>
