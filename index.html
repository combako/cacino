<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino</title>
    <script src="https://telegram.org"></script>
    <style>
        body { background: #0b0a12; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .block { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .btn { background: #0072ff; color: #fff; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; margin-bottom: 8px; font-size: 15px; }
        input { width: 100%; box-sizing: border-box; padding: 12px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; text-align: center; margin-bottom: 10px; }
        .tabs { display: flex; background: #000; padding: 3px; border-radius: 10px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; border-radius: 8px; color: #888; font-weight: bold; }
        .tab.active { background: #ffca28; color: #000; }
    </style>
</head>
<body>

    <div class="block">
        <div class="tabs">
            <div id="t-stars" class="tab active" onclick="setCurr('stars')">⭐ STARS</div>
            <div id="t-ton" class="tab" onclick="setCurr('ton')">💎 TON</div>
        </div>
        <h2 id="bal-txt">150 ⭐</h2>
    </div>

    <div class="block">
        <h3>🚀 КРАШ ИГРА</h3>
        <h1 id="mult" style="color:#00ff66;">1.00x</h1>
        <div id="rocket" style="font-size:30px; margin-bottom:15px;">🚀</div>
        <button class="btn" id="b-start" onclick="goCrash()">ВЗЛЕТ РАКЕТЫ</button>
        <button class="btn" id="b-take" onclick="stopCrash()" style="display:none; background:#00b09b;">ЗАБРАТЬ</button>
    </div>

    <div class="block">
        <h3>🎰 РУЛЕТКА</h3>
        <h1 id="wheel">❓</h1>
        <button class="btn" style="background:#ff416c;" onclick="spin('red')">🔴 НА КРАСНОЕ</button>
        <button class="btn" style="background:#2c3e50;" onclick="spin('black')">⚫ НА ЧЕРНОЕ</button>
    </div>

    <div class="block">
        <h3>🛒 МАГАЗИН</h3>
        <button class="btn" style="background:#222;" onclick="buy('stars_50')">➕ 50 Звезд (⭐)</button>
        <button class="btn" style="background:#222;" onclick="buy('stars_100')">➕ 100 Звезд (⭐)</button>
        <button class="btn" style="background:#222;" onclick="buy('ton_1')">➕ 1 TON (💎)</button>
    </div>

    <div class="block">
        <h3>💎 ВЫВОД</h3>
        <input type="text" id="wallet" placeholder="Адрес TON кошелька (UQ...)">
        <button class="btn" style="background:purple;" onclick="out()">ВЫВЕСТИ ВСЁ</button>
    </div>

    <script>
        let bal = { stars: 150, ton: 5.0 };
        let cur = 'stars';
        let run = null;
        let cx = 1.0;
        let cl = 1.0;

        function setCurr(c) {
            cur = c;
            document.getElementById('t-stars').className = c === 'stars' ? 'tab active' : 'tab';
            document.getElementById('t-ton').className = c === 'ton' ? 'tab active' : 'tab';
            document.getElementById('bal-txt').innerText = c === 'stars' ? bal.stars + ' ⭐' : bal.ton.toFixed(2) + ' TON';
        }

        function goCrash() {
            let fee = cur === 'stars' ? 10 : 0.1;
            if (bal[cur] < fee) return alert("Нет денег!");
            bal[cur] -= fee;
            setCurr(cur);
            document.getElementById('b-start').style.display = 'none';
            document.getElementById('b-take').style.display = 'block';
            cx = 1.0;
            cl = Math.random() < 0.6 ? parseFloat((Math.random()*0.5+1.05).toFixed(2)) : parseFloat((Math.random()*3+1.5).toFixed(2));
            run = setInterval(() => {
                if (cx >= cl) {
                    clearInterval(run);
                    document.getElementById('mult').innerText = "💥 " + cl + "x";
                    document.getElementById('b-start').style.display = 'block';
                    document.getElementById('b-take').style.display = 'none';
                    return;
                }
                cx += 0.03;
                document.getElementById('mult').innerText = cx.toFixed(2) + "x";
            }, 100);
        }

        function stopCrash() {
            clearInterval(run);
            let fee = cur === 'stars' ? 10 : 0.1;
            let win = cur === 'stars' ? Math.floor(fee * cx) : parseFloat((fee * cx).toFixed(2));
            bal[cur] += win;
            setCurr(cur);
            alert("Выиграно: " + win);
            document.getElementById('b-start').style.display = 'block';
            document.getElementById('b-take').style.display = 'none';
        }

        function spin(bet) {
            let fee = cur === 'stars' ? 10 : 0.1;
            if (bal[cur] < fee) return alert("Нет денег!");
            bal[cur] -= fee;
            setCurr(cur);
            document.getElementById('wheel').innerText = "🌀";
            setTimeout(() => {
                let res = Math.random() < 0.5 ? 'red' : 'black';
                document.getElementById('wheel').innerText = res === 'red' ? "🔴" : "⚫";
                if (bet === res) { bal[cur] += (fee * 2); alert("Победа!"); }
                else { alert("Проигрыш!"); }
                setCurr(cur);
            }, 1000);
        }

        function buy(id) {
            window.Telegram.WebApp.sendData(JSON.stringify({action: "buy", item: id}));
            window.Telegram.WebApp.close();
        }

        function out() {
            let w = document.getElementById('wallet').value.trim();
            if (!w) return alert("Введите кошелек!");
            window.Telegram.WebApp.sendData(JSON.stringify({action: "withdraw", currency: cur, amount: bal[cur], ton_wallet: w}));
            bal[cur] = 0;
            setCurr(cur);
            window.Telegram.WebApp.close();
        }
    </script>
</body>
</html>
